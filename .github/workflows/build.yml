name: Build & Release

on:
  push:
    branches: [master, main]   # كل push على master → build + release تلقائي
  pull_request:
    branches: [master, main]   # على PRs: build بس بدون release
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ══════════════════════════════════════════════════════════════
# BUILD JOBS
# ══════════════════════════════════════════════════════════════
jobs:

  # ── Windows Tray — بدون CGO، يُبنى من Linux ───────────────
  windows-tray:
    name: "🪟 Windows Tray (cross-compile)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-H=windowsgui -s -w" -o internet-monitor-windows.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-tray
          path: internet-monitor-windows.exe

  # ── Windows GUI — CGO + WebView2 ────────────────────────────
  windows-gui:
    name: "🪟 Windows GUI (native)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate app icon (embed favicon as .syso)
        run: |
          go install github.com/tc-hib/go-winres@latest
          cd cmd/gui
          go-winres simply --arch amd64 --icon ../../dashboard/assets/favicon.png

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-H=windowsgui -s -w" -o internet-monitor-gui-windows.exe ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: internet-monitor-gui-windows.exe

  # ── macOS — arm64 native + amd64 cross-compile ──────────────
  macos:
    name: "🍎 macOS (arm64 + intel)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ARM64 (native)
        env:
          CGO_ENABLED: 1
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w" -o internet-monitor-macos-arm64 .
          go build -ldflags="-s -w" -o internet-monitor-gui-macos-arm64 ./cmd/gui/

      - name: Build Intel/amd64 (cross-compile via Xcode)
        env:
          CGO_ENABLED: 1
          GOARCH: amd64
          CGO_CFLAGS: "-arch x86_64"
          CGO_LDFLAGS: "-arch x86_64"
        run: |
          go build -ldflags="-s -w" -o internet-monitor-macos-intel .
          go build -ldflags="-s -w" -o internet-monitor-gui-macos-intel ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            internet-monitor-macos-arm64
            internet-monitor-macos-intel
            internet-monitor-gui-macos-arm64
            internet-monitor-gui-macos-intel

  # ── Linux — AppIndicator + WebKitGTK ────────────────────────
  linux:
    name: "🐧 Linux (ubuntu-22.04)"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev

      - name: Build Tray
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o internet-monitor-linux .

      - name: Build GUI
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o internet-monitor-gui-linux ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            internet-monitor-linux
            internet-monitor-gui-linux

  # ══════════════════════════════════════════════════════════════
  # AUTO RELEASE — يعمل فقط على push لـ master (مش PRs)
  # 1. يولّد version tag تلقائي من الـ commits (feat/fix/BREAKING)
  # 2. GitHub AI يكتب الـ changelog من الـ commits والـ PRs
  # ══════════════════════════════════════════════════════════════
  release:
    name: "🚀 Auto Release"
    needs: [windows-tray, windows-gui, macos, linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # محتاج كل الـ history عشان يحسب الـ version

      # ── يولّد version tag تلقائي ──────────────────────────────
      # feat: commit   → minor bump  (v1.1.0)
      # fix: commit    → patch bump  (v1.0.1)
      # BREAKING CHANGE → major bump (v2.0.0)
      # أي commit تاني → patch bump  (v1.0.1)
      - name: Generate version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master,main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Make Linux/macOS binaries executable
        run: |
          chmod +x \
            dist/internet-monitor-linux \
            dist/internet-monitor-gui-linux \
            dist/internet-monitor-macos-* \
            dist/internet-monitor-gui-macos-* \
            2>/dev/null || true

      # ── ينشر Release بـ AI-generated changelog ───────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "Internet Monitor ${{ steps.tag.outputs.new_tag }}"
          generate_release_notes: true   # GitHub AI يكتب الـ changelog
          prerelease: false
          files: |
            dist/internet-monitor-windows.exe
            dist/internet-monitor-gui-windows.exe
            dist/internet-monitor-macos-intel
            dist/internet-monitor-macos-arm64
            dist/internet-monitor-gui-macos-intel
            dist/internet-monitor-gui-macos-arm64
            dist/internet-monitor-linux
            dist/internet-monitor-gui-linux
            config.json
          body: |
            ## مراقب الإنترنت — Internet Monitor ${{ steps.tag.outputs.new_tag }}

            ### حمّل الملف المناسب لجهازك

            | الملف | النظام | النوع |
            | ----- | ------ | ----- |
            | `internet-monitor-windows.exe` | Windows 10/11 | Tray (خلفية) |
            | `internet-monitor-gui-windows.exe` | Windows 10/11 | نافذة مستقلة |
            | `internet-monitor-macos-arm64` | macOS M1/M2/M3 | Tray |
            | `internet-monitor-macos-intel` | macOS Intel | Tray |
            | `internet-monitor-gui-macos-arm64` | macOS M1/M2/M3 | نافذة مستقلة |
            | `internet-monitor-gui-macos-intel` | macOS Intel | نافذة مستقلة |
            | `internet-monitor-linux` | Linux | Tray |
            | `internet-monitor-gui-linux` | Linux | نافذة مستقلة |

            > حمّل الملف التنفيذي فقط — `config.json` بيتعمل تلقائياً أول تشغيل.

            ---

            <!-- تفاصيل الـ changelog بتتولّد تلقائياً من GitHub أعلاه -->
