name: Build & Release

on:
  push:
    branches: [master, main]   # triggers build + auto-release on every push to master
  pull_request:
    branches: [master, main]   # triggers build only (no release) on PRs
  workflow_dispatch:            # manual trigger from GitHub UI

env:
  GO_VERSION: '1.21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ══════════════════════════════════════════════════════════════
# BUILD JOBS
# ══════════════════════════════════════════════════════════════
jobs:

  # ── Windows Tray — no CGO, cross-compiled from Linux ─────────
  windows-tray:
    name: "🪟 Windows Tray (cross-compile)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-H=windowsgui -s -w -X main.Version=${{ github.ref_name }}" -o internet-monitor-windows.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-tray
          path: internet-monitor-windows.exe

  # ── Windows GUI — CGO + WebView2, requires Windows runner ────
  windows-gui:
    name: "🪟 Windows GUI (native)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate app icon (embed favicon as .syso)
        run: |
          go install github.com/tc-hib/go-winres@latest
          cd cmd/gui
          go-winres simply --arch amd64 --icon ../../dashboard/assets/favicon.png

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-H=windowsgui -s -w" -o internet-monitor-gui-windows.exe ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: internet-monitor-gui-windows.exe

  # ── macOS — arm64 native + amd64 cross-compiled via Xcode ────
  macos:
    name: "🍎 macOS (arm64 + intel)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ARM64 (native)
        env:
          CGO_ENABLED: 1
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w" -o internet-monitor-macos-arm64 .
          go build -ldflags="-s -w" -o internet-monitor-gui-macos-arm64 ./cmd/gui/

      - name: Build Intel/amd64 (cross-compile via Xcode)
        env:
          CGO_ENABLED: 1
          GOARCH: amd64
          CGO_CFLAGS: "-arch x86_64"
          CGO_LDFLAGS: "-arch x86_64"
        run: |
          go build -ldflags="-s -w" -o internet-monitor-macos-intel .
          go build -ldflags="-s -w" -o internet-monitor-gui-macos-intel ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            internet-monitor-macos-arm64
            internet-monitor-macos-intel
            internet-monitor-gui-macos-arm64
            internet-monitor-gui-macos-intel

  # ── Linux — AppIndicator (systray) + WebKitGTK (native GUI) ──
  linux:
    name: "🐧 Linux (ubuntu-22.04)"
    runs-on: ubuntu-22.04          # pinned to 22.04 to ensure webkit2gtk-4.0 availability
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev

      - name: Build Tray
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o internet-monitor-linux .

      - name: Build GUI
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o internet-monitor-gui-linux ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            internet-monitor-linux
            internet-monitor-gui-linux

  # ══════════════════════════════════════════════════════════════
  # AUTO RELEASE — runs only on push to master (not on PRs)
  # 1. Auto-generates a version tag from commits (feat/fix/BREAKING)
  # 2. GitHub AI writes the changelog from commits and PRs
  # ══════════════════════════════════════════════════════════════
  release:
    name: "🚀 Auto Release"
    needs: [windows-tray, windows-gui, macos, linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required to calculate the next version tag

      # Auto-generates a semantic version tag from commit messages:
      # feat: commit        → minor bump  (v1.1.0)
      # fix: commit         → patch bump  (v1.0.1)
      # BREAKING CHANGE     → major bump  (v2.0.0)
      # any other commit    → patch bump  (v1.0.1)
      - name: Generate version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master,main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Make Linux/macOS binaries executable
        run: |
          chmod +x \
            dist/internet-monitor-linux \
            dist/internet-monitor-gui-linux \
            dist/internet-monitor-macos-* \
            dist/internet-monitor-gui-macos-* \
            2>/dev/null || true

      # Creates the GitHub Release with AI-generated changelog
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "Internet Monitor ${{ steps.tag.outputs.new_tag }}"
          generate_release_notes: true   # GitHub AI writes the changelog
          prerelease: false
          files: |
            dist/internet-monitor-windows.exe
            dist/internet-monitor-gui-windows.exe
            dist/internet-monitor-macos-intel
            dist/internet-monitor-macos-arm64
            dist/internet-monitor-gui-macos-intel
            dist/internet-monitor-gui-macos-arm64
            dist/internet-monitor-linux
            dist/internet-monitor-gui-linux
            config.json
          body: |
            ## Internet Monitor ${{ steps.tag.outputs.new_tag }}

            ### Download the right file for your OS

            | File | OS | Mode |
            | ---- | -- | ---- |
            | `internet-monitor-windows.exe` | Windows 10/11 | System Tray |
            | `internet-monitor-gui-windows.exe` | Windows 10/11 | Standalone window |
            | `internet-monitor-macos-arm64` | macOS M1/M2/M3 | System Tray |
            | `internet-monitor-macos-intel` | macOS Intel | System Tray |
            | `internet-monitor-gui-macos-arm64` | macOS M1/M2/M3 | Standalone window |
            | `internet-monitor-gui-macos-intel` | macOS Intel | Standalone window |
            | `internet-monitor-linux` | Linux | System Tray |
            | `internet-monitor-gui-linux` | Linux | Standalone window |

            > Download the binary only — `config.json` is created automatically on first run.

            ---

            <!-- Full changelog is auto-generated by GitHub above -->
