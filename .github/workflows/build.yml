name: Build & Release

on:
  push:
    branches: [master, main]  # build at each push to master
    tags:
      - 'v*'                  # release at tag
  pull_request:
    branches: [master, main]
  workflow_dispatch:          # manual trigger from GitHub UI

env:
  GO_VERSION: '1.21'

# ══════════════════════════════════════════════════════════════
# JOBS
# ══════════════════════════════════════════════════════════════
jobs:

  # ── Windows Tray — without CGO، built from Linux ───────────────
  windows-tray:
    name: "🪟 Windows Tray (cross-compile)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-H=windowsgui -s -w" -o internet-monitor-windows.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-tray
          path: internet-monitor-windows.exe

  # ── Windows GUI — CGO + WebView2، need Windows runner ────
  windows-gui:
    name: "🪟 Windows GUI (native)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-H=windowsgui -s -w" -o internet-monitor-gui-windows.exe ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: internet-monitor-gui-windows.exe

  # ── macOS — arm64 native + amd64 cross-compile (single runner) ─
  # macos-latest = Apple Silicon — Xcode supports cross-compiling to x86_64
  macos:
    name: "🍎 macOS (arm64 + intel)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ARM64 (native)
        env:
          CGO_ENABLED: 1
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w" -o internet-monitor-macos-arm64 .
          go build -ldflags="-s -w" -o internet-monitor-gui-macos-arm64 ./cmd/gui/

      - name: Build Intel/amd64 (cross-compile via Xcode)
        env:
          CGO_ENABLED: 1
          GOARCH: amd64
          CGO_CFLAGS: "-arch x86_64"
          CGO_LDFLAGS: "-arch x86_64"
        run: |
          go build -ldflags="-s -w" -o internet-monitor-macos-intel .
          go build -ldflags="-s -w" -o internet-monitor-gui-macos-intel ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            internet-monitor-macos-arm64
            internet-monitor-macos-intel
            internet-monitor-gui-macos-arm64
            internet-monitor-gui-macos-intel

  # ── Linux — AppIndicator + WebKitGTK ───────────────────────
  linux:
    name: "🐧 Linux (ubuntu-22.04)"
    runs-on: ubuntu-22.04          # installed on 22.04 to ensure webkit2gtk-4.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev

      - name: Build Tray
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o internet-monitor-linux .

      - name: Build GUI
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o internet-monitor-gui-linux ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            internet-monitor-linux
            internet-monitor-gui-linux

  # ══════════════════════════════════════════════════════════
  # RELEASE — works only at push tag (v*)
  # ══════════════════════════════════════════════════════════
  release:
    name: "🚀 Create GitHub Release"
    needs: [windows-tray, windows-gui, macos, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Make Linux/macOS binaries executable
        run: chmod +x dist/internet-monitor-linux dist/internet-monitor-gui-linux dist/internet-monitor-macos-* dist/internet-monitor-gui-macos-* 2>/dev/null || true

      - name: Show artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Internet Monitor ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            dist/internet-monitor-windows.exe
            dist/internet-monitor-gui-windows.exe
            dist/internet-monitor-macos-intel
            dist/internet-monitor-macos-arm64
            dist/internet-monitor-gui-macos-intel
            dist/internet-monitor-gui-macos-arm64
            dist/internet-monitor-linux
            dist/internet-monitor-gui-linux
            config.json
          body: |
            ## مراقب الإنترنت — Internet Monitor ${{ github.ref_name }}

            ### Download the appropriate file for your device

            | File | System | App Type |
            |-------|--------|-------------|
            | `internet-monitor-windows.exe` | Windows 10/11 | Runs in the background (Tray icon) |
            | `internet-monitor-gui-windows.exe` | Windows 10/11 | Standalone window |
            | `internet-monitor-macos-intel` | macOS Intel | Runs in the background |
            | `internet-monitor-macos-arm64` | macOS M1/M2/M3 | Runs in the background |
            | `internet-monitor-gui-macos-intel` | macOS Intel | Standalone window |
            | `internet-monitor-gui-macos-arm64` | macOS M1/M2/M3 | Standalone window |
            | `internet-monitor-linux` | Ubuntu/Debian | Runs in the background |
            | `internet-monitor-gui-linux` | Ubuntu/Debian | Standalone window |

            > **Instructions:** Download the binary and `config.json` in the same folder.

            ---
            Built automatically with GitHub Actions ·
            [Source code](https://github.com/${{ github.repository }})
