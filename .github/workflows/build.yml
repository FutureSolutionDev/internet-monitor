name: Build & Release

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ══════════════════════════════════════════════════════════════
  # QUALITY — gofmt / vet / tests (must pass before build/release)
  # ══════════════════════════════════════════════════════════════
  quality:
    name: "✅ Quality (fmt / vet / test)"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps (CGO packages: tray + webview)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # Blocking lint over the whole module. The linux pass (GTK installed
      # above) covers the portable packages plus the tray/GUI linux builds; the
      # windows pass covers the windows-only (syscall) files in tray/root/sound.
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          golangci-lint run ./...
          GOOS=windows CGO_ENABLED=0 golangci-lint run . ./tray/... ./sound/...

  # ══════════════════════════════════════════════════════════════
  # VERSION — generates the semver tag first (push only)
  # Build jobs depend on this so they embed the correct version.
  # ══════════════════════════════════════════════════════════════
  version:
    name: "🏷️ Generate Version Tag"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master,main

  # ══════════════════════════════════════════════════════════════
  # BUILD JOBS — all depend on version (if: always() keeps them
  # running on PRs where version job is skipped)
  # ══════════════════════════════════════════════════════════════

  # ── Windows Tray — no CGO, cross-compiled from Linux ─────────
  windows-tray:
    name: "🪟 Windows Tray (cross-compile)"
    runs-on: ubuntu-latest
    needs: [version, quality]
    if: ${{ always() && needs.quality.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ needs.version.outputs.new_tag || 'dev' }}
        run: go build -ldflags="-H=windowsgui -s -w -X main.Version=$VERSION" -o internet-monitor-windows.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-tray
          path: internet-monitor-windows.exe

  # ── Windows GUI — CGO + WebView2, requires Windows runner ────
  windows-gui:
    name: "🪟 Windows GUI (native)"
    runs-on: windows-latest
    needs: [version, quality]
    if: ${{ always() && needs.quality.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate app icon (embed favicon as .syso)
        run: |
          go install github.com/tc-hib/go-winres@latest
          cd cmd/gui
          go-winres simply --arch amd64 --icon ../../dashboard/assets/favicon.png

      - name: Build
        env:
          CGO_ENABLED: 1
          VERSION: ${{ needs.version.outputs.new_tag || 'dev' }}
        run: go build -ldflags="-H=windowsgui -s -w -X main.Version=$env:VERSION" -o internet-monitor-gui-windows.exe ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: internet-monitor-gui-windows.exe

  # ── macOS — arm64 native + amd64 cross-compiled via Xcode ────
  macos:
    name: "🍎 macOS (arm64 + intel)"
    runs-on: macos-latest
    needs: [version, quality]
    if: ${{ always() && needs.quality.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build ARM64 (native)
        env:
          CGO_ENABLED: 1
          GOARCH: arm64
          VERSION: ${{ needs.version.outputs.new_tag || 'dev' }}
        run: |
          go build -ldflags="-s -w -X main.Version=$VERSION" -o internet-monitor-macos-arm64 .
          go build -ldflags="-s -w -X main.Version=$VERSION" -o internet-monitor-gui-macos-arm64 ./cmd/gui/

      - name: Build Intel/amd64 (cross-compile via Xcode)
        env:
          CGO_ENABLED: 1
          GOARCH: amd64
          CGO_CFLAGS: "-arch x86_64"
          CGO_LDFLAGS: "-arch x86_64"
          VERSION: ${{ needs.version.outputs.new_tag || 'dev' }}
        run: |
          go build -ldflags="-s -w -X main.Version=$VERSION" -o internet-monitor-macos-intel .
          go build -ldflags="-s -w -X main.Version=$VERSION" -o internet-monitor-gui-macos-intel ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            internet-monitor-macos-arm64
            internet-monitor-macos-intel
            internet-monitor-gui-macos-arm64
            internet-monitor-gui-macos-intel

  # ── Linux — AppIndicator (systray) + WebKitGTK (native GUI) ──
  linux:
    name: "🐧 Linux (ubuntu-22.04)"
    runs-on: ubuntu-22.04
    needs: [version, quality]
    if: ${{ always() && needs.quality.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.0-dev

      - name: Build Tray
        env:
          CGO_ENABLED: 1
          VERSION: ${{ needs.version.outputs.new_tag || 'dev' }}
        run: go build -ldflags="-s -w -X main.Version=$VERSION" -o internet-monitor-linux .

      - name: Build GUI
        env:
          CGO_ENABLED: 1
          VERSION: ${{ needs.version.outputs.new_tag || 'dev' }}
        run: go build -ldflags="-s -w -X main.Version=$VERSION" -o internet-monitor-gui-linux ./cmd/gui/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            internet-monitor-linux
            internet-monitor-gui-linux

  # ══════════════════════════════════════════════════════════════
  # RELEASE — runs only on push to master, after all builds pass
  # Tag was already created by the version job above.
  # ══════════════════════════════════════════════════════════════
  release:
    name: "🚀 Auto Release"
    needs: [version, windows-tray, windows-gui, macos, linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.version.outputs.new_tag != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Make Linux/macOS binaries executable
        run: |
          chmod +x \
            dist/internet-monitor-linux \
            dist/internet-monitor-gui-linux \
            dist/internet-monitor-macos-* \
            dist/internet-monitor-gui-macos-* \
            2>/dev/null || true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum internet-monitor-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: "Internet Monitor ${{ needs.version.outputs.new_tag }}"
          generate_release_notes: true
          prerelease: false
          files: |
            dist/internet-monitor-windows.exe
            dist/internet-monitor-gui-windows.exe
            dist/internet-monitor-macos-intel
            dist/internet-monitor-macos-arm64
            dist/internet-monitor-gui-macos-intel
            dist/internet-monitor-gui-macos-arm64
            dist/internet-monitor-linux
            dist/internet-monitor-gui-linux
            dist/SHA256SUMS
            config.json
          body: |
            ## Internet Monitor ${{ needs.version.outputs.new_tag }}

            ### Download the right file for your OS

            | File | OS | Mode |
            | ---- | -- | ---- |
            | `internet-monitor-windows.exe` | Windows 10/11 | System Tray |
            | `internet-monitor-gui-windows.exe` | Windows 10/11 | Standalone window |
            | `internet-monitor-macos-arm64` | macOS M1/M2/M3 | System Tray |
            | `internet-monitor-macos-intel` | macOS Intel | System Tray |
            | `internet-monitor-gui-macos-arm64` | macOS M1/M2/M3 | Standalone window |
            | `internet-monitor-gui-macos-intel` | macOS Intel | Standalone window |
            | `internet-monitor-linux` | Linux | System Tray |
            | `internet-monitor-gui-linux` | Linux | Standalone window |

            > Download the binary only — `config.json` is created automatically on first run.

            ---

