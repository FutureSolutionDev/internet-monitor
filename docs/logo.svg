<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="26" fill="url(#bgGrad)"/>

  <!-- Globe body -->
  <circle cx="60" cy="56" r="34" fill="url(#globeGrad)" opacity="0.15"/>
  <circle cx="60" cy="56" r="34" fill="none" stroke="#3b82f6" stroke-width="2.2"/>

  <!-- Latitude lines -->
  <ellipse cx="60" cy="56" rx="34" ry="13" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <!-- Equator -->
  <line x1="26" y1="56" x2="94" y2="56" stroke="#3b82f6" stroke-width="1" opacity="0.35"/>
  <!-- Longitude center -->
  <ellipse cx="60" cy="56" rx="17" ry="34" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

  <!-- Pulse / heartbeat line — the "monitor" element -->
  <polyline
    points="26,56 36,56 40,38 45,74 50,46 55,64 60,56 94,56"
    fill="none"
    stroke="#22c55e"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Live dot at pulse end -->
  <circle cx="94" cy="56" r="4" fill="#22c55e" filter="url(#glow)"/>

  <!-- Small ring around live dot -->
  <circle cx="94" cy="56" r="7" fill="none" stroke="#22c55e" stroke-width="1.2" opacity="0.5"/>
</svg>
